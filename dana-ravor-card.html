  .card {
    width:96vw; max-width:540px;
    background:rgba(255,255,255,0.93);
    border-radius:28px; overflow:hidden;
    box-shadow:0 10px 50px rgba(80,50,160,0.28);
    border:2px solid rgba(180,150,230,0.45);
  }
  .card-top {
    background:rgba(255,255,255,0.88);
    padding:1.8rem 2rem 1.2rem;
    text-align:center;
    border-bottom:1.5px solid rgba(180,150,230,0.3);
  }
  .logo-wrap { margin-bottom:0.9rem; display:flex; justify-content:center; }
  .logo-wrap img { height:100px; width:auto; object-fit:contain; }
  .photo-wrap {
    margin:0 auto 1rem;
    width:140px; height:140px;
    border-radius:50%; overflow:hidden;
    border:4px solid #5a3fa0;
    box-shadow:0 3px 18px rgba(90,63,160,0.3);
  }
  .photo-wrap img {
    width:100%; height:130%;
    object-fit:cover; object-position:center 10%; margin-top:-8%;
  }
  .card-name {
    font-family:'Caveat',cursive;
    font-size:34px; font-weight:600;
    color:#2d1f5e; margin-bottom:3px;
  }
  .card-specialty { font-size:19px; font-weight:600; color:#3d2878; margin-bottom:6px; }
  .card-desc { font-size:17px; color:#6a5a9a; line-height:1.5; margin-bottom:9px; }
  .card-location {
    display:inline-block; font-size:12px; color:#8a78be;
    background:rgba(220,210,245,0.5); border-radius:20px;
    padding:3px 13px; border:1px solid rgba(180,150,230,0.35);
  }
  .quote-box {
    background:#3d2878; padding:1rem 1.5rem;
    text-align:center; min-height:76px;
    display:flex; align-items:center; justify-content:center;
  }
  .quote-inner {
    transition:opacity 0.5s ease;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .quote-sentence {
    font-family:'Caveat',cursive;
    font-size:22px; font-weight:500;
    color:#f0eaff; line-height:1.4; direction:rtl;
  }
  .quote-author {
    font-family:'Caveat',cursive;
    font-size:21px; font-weight:600; color:#e0d4ff;
  }
  .card-body { padding:0.9rem 1.8rem 0.4rem; }
  .row {
    display:flex; align-items:center; gap:13px;
    padding:10px 0; border-bottom:1px solid rgba(180,150,230,0.25);
    text-decoration:none; color:inherit; cursor:pointer;
  }
  .row:last-child { border-bottom:none; }
  .ico { width:38px; height:38px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .ico svg { width:19px; height:19px; }
  .ico-phone { background:#ede8f8; } .ico-phone svg { color:#4a3b8a; }
  .ico-wa    { background:#e4f5ee; } .ico-wa svg  { color:#128C7E; }
  .ico-web   { background:#ede8f8; } .ico-web svg { color:#4a3b8a; }
  .ico-li    { background:#e4f0f8; } .ico-li svg  { color:#0077b5; }
  .lbl { font-size:11px; color:#9a88c0; margin-bottom:1px; }
  .val { font-size:16px; font-weight:600; color:#2d1f5e; }
  .val-link { font-size:16px; font-weight:600; color:#4a3b8a; }
  .btn-wrap { padding:0.75rem 1.8rem 0; }
  .btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:12px;
    background:#3d2878; color:#fff;
    border:none; border-radius:12px;
    font-family:'Secular One',sans-serif; font-size:15px; font-weight:500;
    cursor:pointer; transition:background 0.2s;
  }
  .btn:hover { background:#5a3fa0; }
  .btn svg { width:17px; height:17px; }
  .card-foot { padding:0.8rem 1.8rem 1.2rem; display:flex; justify-content:center; }
  .tag {
    font-size:12px; color:#7a68be;
    background:rgba(220,210,245,0.65); border-radius:20px;
    padding:4px 16px; border:1px solid rgba(180,150,230,0.4);
  }
</style>
