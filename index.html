  .card {
    width:96vw; max-width:420px;
    background:rgba(255,255,255,0.93);
    border-radius:20px; overflow:hidden;
    box-shadow:0 10px 50px rgba(80,50,160,0.28);
    border:2px solid rgba(180,150,230,0.45);
  }
  .card-top {
    background:rgba(255,255,255,0.88);
    padding:0.6rem 1.2rem 0.5rem;
    text-align:center;
    border-bottom:1.5px solid rgba(180,150,230,0.3);
  }
  .logo-wrap { margin-bottom:0.4rem; display:flex; justify-content:center; }
  .logo-wrap img { height:55px; width:auto; object-fit:contain; }
  .photo-wrap {
    margin:0 auto 0.5rem;
    width:90px; height:90px;
    border-radius:50%; overflow:hidden;
    border:4px solid #5a3fa0;
    box-shadow:0 3px 18px rgba(90,63,160,0.3);
  }
  .photo-wrap img {
    width:100%; height:130%;
    object-fit:cover; object-position:center 10%; margin-top:-8%;
  }
  .card-name {
    font-family:'Caveat',cursive;
    font-size:24px; font-weight:600;
    color:#2d1f5e; margin-bottom:2px;
  }
  .card-specialty { font-size:14px; font-weight:600; color:#3d2878; margin-bottom:3px; }
  .card-desc { font-size:13px; color:#6a5a9a; line-height:1.4; margin-bottom:5px; }
  .card-location {
    display:inline-block; font-size:11px; color:#8a78be;
    background:rgba(220,210,245,0.5); border-radius:20px;
    padding:2px 10px; border:1px solid rgba(180,150,230,0.35);
  }
  .quote-box {
    background:#3d2878; padding:0.5rem 1rem;
    text-align:center; min-height:50px;
    display:flex; align-items:center; justify-content:center;
  }
  .quote-inner {
    transition:opacity 0.5s ease;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .quote-sentence {
    font-family:'Caveat',cursive;
    font-size:16px; font-weight:500;
    color:#f0eaff; line-height:1.3; direction:rtl;
  }
  .quote-author {
    font-family:'Caveat',cursive;
    font-size:14px; font-weight:600; color:#e0d4ff;
  }
  .card-body { padding:0.3rem 1.2rem 0.2rem; }
  .row {
    display:flex; align-items:center; gap:10px;
    padding:6px 0; border-bottom:1px solid rgba(180,150,230,0.25);
    text-decoration:none; color:inherit; cursor:pointer;
  }
  .row:last-child { border-bottom:none; }
  .ico { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .ico svg { width:15px; height:15px; }
  .ico-phone { background:#ede8f8; } .ico-phone svg { color:#4a3b8a; }
  .ico-wa    { background:#e4f5ee; } .ico-wa svg  { color:#128C7E; }
  .ico-web   { background:#ede8f8; } .ico-web svg { color:#4a3b8a; }
  .ico-li    { background:#e4f0f8; } .ico-li svg  { color:#0077b5; }
  .lbl { font-size:10px; color:#9a88c0; margin-bottom:0px; }
  .val { font-size:13px; font-weight:600; color:#2d1f5e; }
  .val-link { font-size:13px; font-weight:600; color:#4a3b8a; }
  .btn-wrap { padding:0.3rem 1.2rem 0; }
  .btn {
    display:flex; align-items:center; justify-content:center; gap:8px;
    width:100%; padding:8px;
    background:#3d2878; color:#fff;
    border:none; border-radius:12px;
    font-family:'Secular One',sans-serif; font-size:13px; font-weight:500;
    cursor:pointer; transition:background 0.2s;
  }
  .btn:hover { background:#5a3fa0; }
  .btn svg { width:14px; height:14px; }
  .card-foot { padding:0.3rem 1.2rem 0.4rem; display:flex; justify-content:center; }
  .tag {
    font-size:10px; color:#7a68be;
    background:rgba(220,210,245,0.65); border-radius:20px;
    padding:4px 16px; border:1px solid rgba(180,150,230,0.4);
  }
</style>
